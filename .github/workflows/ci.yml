# Fully automated checks on every push and pull request: Python API, Next.js, Docker images
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile package
        run: python -m compileall -q api

      - name: Import application
        run: python -c "from api.main import app; assert app.title == 'MedComply API'"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_AUTH_PROVIDER: mock

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t medcomply-api:ci ./backend

      - name: Build web image
        run: |
          docker build -t medcomply-web:ci \
            --build-arg NEXT_PUBLIC_API_URL=http://127.0.0.1:8000 \
            ./frontend

      - name: Verify images
        run: |
          docker image inspect medcomply-api:ci
          docker image inspect medcomply-web:ci
